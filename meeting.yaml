# 规则格式参考: https://clash.wiki/configuration/rules.html
payload:
  # ==================================================
  # === 1. Zoom (全球商务会议绝对霸主 - 纯国际版核心) ===
  # ==================================================
  # 彻底剥离任何中国大陆优化后缀，强制国际版全速走海外节点
  - DOMAIN-SUFFIX,zoom.us
  - DOMAIN-SUFFIX,zoom.com
  - DOMAIN-SUFFIX,zoom.gov

  # ==================================================
  # === 2. Microsoft Teams (微软企业跨境会议专属) ===
  # ==================================================
  # 剔除 microsoft.com 主域，仅精准捕捉 Teams 会议与底层音视频流
  - DOMAIN-SUFFIX,teams.microsoft.com
  - DOMAIN-SUFFIX,teams.live.com
  - DOMAIN-SUFFIX,skype.com

  # ==================================================
  # === 3. Google Meet (谷歌原生网页/App会议) ===
  # ==================================================
  # 仅抓取 Meet 会议的核心通信域，剔除所有第三方谷歌依赖
  - DOMAIN-SUFFIX,meet.google.com

  # ==================================================
  # === 4. Cisco Webex (思科老牌大型跨国会议) ===
  # ==================================================
  # 剔除中国大陆优化域，仅锁定其全球金融/跨国企业级核心会议网络
  - DOMAIN-SUFFIX,webex.com

  # ==================================================
  # === 5. Slack Video & Huddles (硅谷技术团队随身小会) ===
  # ==================================================
  # 专治国内直连时 Slack 临时语音/视频会议闪退、麦克风连不上的问题
  - DOMAIN-SUFFIX,slack.com
  - DOMAIN-SUFFIX,slack-edge.com